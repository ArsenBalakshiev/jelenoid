version: '3.8'

services:
  jelenoid-server:
    image: ghcr.io/arsenbalakshiev/jelenoid:server-latest
    container_name: jelenoid-server
    ports:
      - "4444:4444"
    volumes:
      - "./browsers.json:/app/browsers.json:ro"
    environment:
      - JELENOID_PORT=4444
      - PARALLEL_SESSIONS=10
      - QUEUE_LIMIT=100
      - BROWSERS_FILE=/app/browsers.json
      - QUEUE_TIMEOUT=30000
      - SESSION_TIMEOUT=600000
      - STARTUP_TIMEOUT=30000
      - UI_HOSTS_LIST=http://localhost:80,http://localhost,http://localhost:3000
      - PLAYWRIGHT_SESSION_LIMIT=10
      - PLAYWRIGHT_QUEUE_LIMIT=100
      - PLAYWRIGHT_CONTAINER_POOL_ENABLED=true
      - PLAYWRIGHT_CONTAINER_POOL_MAX_SIZE=10
      - PLAYWRIGHT_CONTAINER_POOL_MAX_PER_KEY=10
      - PLAYWRIGHT_CONTAINER_POOL_IDLE_MS=120000
      - CONTAINER_MANAGER_ADDRESS=http://container-manager:8080
      - JELENOID_PUBLIC_HOST=0.0.0.0   #required!!!
    networks:
      - jelenoid-net

  container-manager:
    image: ghcr.io/arsenbalakshiev/jelenoid:container-manager-latest
    container_name: container-manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CLEANUP_TIMEOUT=15000
      - CONTAINER_STARTING_TIMEOUT=60000
      - DOCKER_NETWORK=jelenoid-net
      - CONTAINER_MANAGER_PORT=8080
    networks:
      - jelenoid-net

  jelenoid-ui:
    image: suomessa/jelenoid:ui-latest
    container_name: jelenoid-ui
    environment:
      - VITE_SERVER_BASE_URL=http://localhost:4444
      - PORT=80
    ports:
      - "80:80"
    networks:
      - jelenoid-net
    depends_on:
     - jelenoid-server

networks:
  jelenoid-net:
    name: jelenoid-net
