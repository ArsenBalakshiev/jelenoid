version: '3.8'

services:
  jelenoid-server:
    image: suomessa/jelenoid:server-latest
    container_name: jelenoid-server
    ports:
      - "4444:4444"
    volumes:
      - "./browsers.json:/app/browsers.json:ro"
    environment:
      - PARALLEL_SESSIONS=10 //optional
      - QUEUE_LIMIT=100 //optional
      - BROWSERS_FILE=/app/browsers.json
      - QUEUE_TIMEOUT=30000 //optional
      - SESSION_TIMEOUT=600000 //optional
      - STARTUP_TIMEOUT=30000 //optional
      - UI_HOSTS_LIST=http://localhost:80,http://localhost //optional
      - PLAYWRIGHT_SESSION_LIMIT=10 //optional
      - PLAYWRIGHT_QUEUE_LIMIT=100 //optional
      - NATS_SERVER=nats://nats:4222 //optional, required if you want collect logs
    networks:
      - jelenoid-net

  container-manager:
    image: suomessa/jelenoid:container-manager-latest
    container_name: container-manager
    volumes:
      - ./container-manager/src:/app/src
      - ./container-manager/target:/app/target
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CLEANUP_TIMEOUT=15000 //optional
      - CONTAINER_STARTING_TIMEOUT=60000 //optional
      - DOCKER_NETWORK=jelenoid-net //optional
      - CONTAINER_MANAGER_PORT=8080 //optional
    networks:
      - jelenoid-net

  metrics-service:
    image: suomessa/jelenoid:metrics-latest
    container_name: metrics-service
    networks:
      - jelenoid-net
    depends_on:
      - nats
      - jelenoid-server
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_URL: jdbc:postgresql://metrics-db:5432/metrics
      POSTGRES_USER: metrics-user
      POSTGRES_PASSWORD: metrics-password

  jelenoid-ui:
    image: suomessa/jelenoid:ui-latest
    container_name: jelenoid-ui
    environment:
      - VITE_SERVER_BASE_URL=http://localhost:4444
      - PORT=80
    ports:
      - "80:80"
    networks:
      - jelenoid-net
    depends_on:
      - jelenoid-server

  nats:
    image: nats:2.10
    container_name: nats
    networks:
      - jelenoid-net
    ports:
      - "4222:4222"
      - "8222:8222"
    command: |
      -js
      -m 8222
      -sd /data/jetstream
    volumes:
      - nats_data:/data/jetstream

  metrics-db:
    image: postgres:16
    container_name: metrics-db
    networks:
      - jelenoid-net
    environment:
      POSTGRES_DB: metrics
      POSTGRES_USER: metrics-user
      POSTGRES_PASSWORD: metrics-password
    ports: [ "5432:5432" ]

networks:
  jelenoid-net:
    name: jelenoid-net

volumes:
  nats_data: {}