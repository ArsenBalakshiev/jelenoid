version: '3.8'

services:
  jelenoid-server:
    build:
      context: ./jelenoid-server
      dockerfile: Dockerfile.dev
    container_name: jelenoid-server
    ports:
      - "4444:4444"
    environment:
      - BROWSERS_FILE=/app/browsers.json
      - CONTAINER_MANAGER_ADDRESS=http://container-manager:8080
    volumes:
      - ./browsers.json:/app/browsers.json:ro
      - ./jelenoid-server:/app
      - go-mod-cache:/go/pkg/mod
    networks:
      - jelenoid-net

  container-manager:
    build:
      context: ./container-manager
      dockerfile: Dockerfile.dev
    container_name: container-manager
    ports:
      - "8080:8080"
    volumes:
      - ./container-manager:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - go-mod-cache:/go/pkg/mod
    networks:
      - jelenoid-net

  jelenoid-ui:
    image: node:20-alpine
    container_name: jelenoid-ui
    working_dir: /app
    volumes:
      - ./jelenoid-ui:/app
    stdin_open: true
    tty: true
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - jelenoid-net
    depends_on:
      - jelenoid-server

  test-app:
    build: ./test-app
    container_name: test-app
    ports:
      - "3000:3000"
    networks:
      - jelenoid-net

networks:
  jelenoid-net:
    name: jelenoid-net

volumes:
  go-mod-cache:
  nats_data: {}

