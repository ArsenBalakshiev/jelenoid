name: Build and publish services on merge

# Собирает и пушит в GHCR образы jelenoid-server, container-manager, jelenoid-ui
# при пуше в main, но только если соответствующая папка менялась
# (плюс сам workflow-файл как триггер обновления пайплайна).
# Все три сервиса тегаются :<name>-latest. Использует self-hosted runner,
# потому что сборка требует Docker-взаимодействия с локальным docker.sock
# (для кэша модулей) и, в случае UI, прогоняет `npm ci` с реального registry.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

# GHCR требует lowercase. github.repository_owner сохраняет регистр
# GitHub-логина (ArsenBalakshiev), а | lower/toLower() не работают в
# workflow-level env у парсера. Используем setup-step с bash tr.
# OWNER экспортится в $GITHUB_ENV и доступен во всех последующих step'ах.

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      cm: ${{ steps.filter.outputs.cm }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'jelenoid-server/**'
              - '.github/workflows/build-services.yml'
            cm:
              - 'container-manager/**'
              - '.github/workflows/build-services.yml'
            ui:
              - 'jelenoid-ui/**'
              - '.github/workflows/build-services.yml'

  jelenoid-server:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.server == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, jelenoid-runner]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Export OWNER (lowercased GitHub login for OCI image tag)
        run: |
          echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/${OWNER}/jelenoid:server-latest" \
            ./jelenoid-server
          docker push "ghcr.io/${OWNER}/jelenoid:server-latest"

  container-manager:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.cm == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, jelenoid-runner]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Export OWNER (lowercased GitHub login for OCI image tag)
        run: |
          echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/${OWNER}/jelenoid:container-manager-latest" \
            ./container-manager
          docker push "ghcr.io/${OWNER}/jelenoid:container-manager-latest"

  jelenoid-ui:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.ui == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, jelenoid-runner]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Export OWNER (lowercased GitHub login for OCI image tag)
        run: |
          echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      # vite-envs плагин требует .env при npm run build; .env в .gitignore, поэтому
      # копируем tracked-шаблон .env.example в build context.
      - name: Provide .env for vite-envs
        run: cp jelenoid-ui/.env.example jelenoid-ui/.env
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/${OWNER}/jelenoid:ui-latest" \
            ./jelenoid-ui
          docker push "ghcr.io/${OWNER}/jelenoid:ui-latest"
