name: Build and publish Chrome image

# Runs once a month to check for new Chrome Stable releases and publish
# new docker images to GHCR if a new version is available.
on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month, 06:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Chrome version to build (leave empty for latest stable)'
        required: false
        type: string
        default: ''
      force:
        description: 'Force rebuild even if version already exists in GHCR'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-chrome:
    # Use a self-hosted runner that has docker access
    runs-on: [self-hosted, jelenoid-runner]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve target version
        id: resolve
        shell: pwsh
        run: |
          $jsonUrl = "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
          $pinned = "${{ inputs.version }}"
          if ($pinned) {
            "version=$pinned" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using pinned version: $pinned"
          } else {
            $data = Invoke-RestMethod -Uri $jsonUrl
            $v = $data.channels.Stable.version
            "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Latest stable: $v"
          }

      - name: Check if version already exists in GHCR
        id: check
        shell: pwsh
        run: |
          $version = "${{ steps.resolve.outputs.version }}"
          $owner = "${{ github.repository_owner }}"
          # In GHCR, `ghcr.io/<owner>/jelenoid:chrome-150.0.x` is one package
          # (`jelenoid`) with a tag `chrome-150.0.x`. So we list versions of
          # the `jelenoid` package and look for our tag.
          $apiUrl = "https://api.github.com/users/$owner/packages/container/jelenoid/versions?per_page=100"

          Write-Host "Listing existing tags from $apiUrl"
          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github+json" }
          $existing = @()
          $url = $apiUrl
          while ($url) {
            $resp = Invoke-RestMethod -Uri $url -Headers $headers
            foreach ($v in $resp) {
              foreach ($t in $v.metadata.container.tags) { $existing += $t }
            }
            $url = $null
            if ($resp.Length -eq 100) {
              $url = $apiUrl + "&page=2"
            }
          }
          Write-Host "Existing tags: $($existing -join ', ')"
          $tag = "chrome-$version"
          $exists = $existing -contains $tag
          $force = [bool]::Parse("${{ inputs.force }}")
          if ($exists -and -not $force) {
            Write-Host "Tag $tag already exists in GHCR. Skipping build."
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Tag $tag not in GHCR (or force=true). Will build."
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.resolve.outputs.version }}"
          $owner = "${{ github.repository_owner }}"
          Set-Location browser-images/selenium-images/chromium/chrome
          python build.py --registry "ghcr.io/$owner" --push --version $version
          if ($LASTEXITCODE -ne 0) { throw "build failed" }
        env:
          # GITHUB_TOKEN is auto-injected by Actions, but we need it for the
          # sub-process python script's docker push auth
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $version = "${{ steps.resolve.outputs.version }}"
          $existed = "${{ steps.check.outputs.exists }}"
          $owner = "${{ github.repository_owner }}"
          if ($existed -eq "true") {
            Write-Host "::notice title=Up to date::ghcr.io/$owner/jelenoid/chrome-$version already published. Nothing to do."
          } else {
            Write-Host "::notice title=Built::ghcr.io/$owner/jelenoid/chrome-$version published."
          }
