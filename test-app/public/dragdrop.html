<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and Drop Page</title>
  <style>
    #source { width: 200px; height: 100px; background: #eee; padding: 20px; margin: 10px; }
    #target { width: 200px; height: 100px; background: #ddd; padding: 20px; margin: 10px; }
    #draggable { width: 50px; height: 30px; background: #4CAF50; color: white; text-align: center; line-height: 30px; cursor: move; }
  </style>
</head>
<body>
  <h1>Drag and Drop Test</h1>
  <div id="source">
    <h3>Source</h3>
    <div id="draggable" draggable="true">Drag me</div>
  </div>
  <div id="target">
    <h3>Target</h3>
  </div>
  <script>
    const draggable = document.getElementById('draggable');
    const target = document.getElementById('target');
    draggable.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text', e.target.id);
    });
    target.addEventListener('dragover', (e) => {
      e.preventDefault();
    });
    target.addEventListener('drop', (e) => {
      e.preventDefault();
      target.appendChild(draggable);
    });
  </script>
</body>
</html>
