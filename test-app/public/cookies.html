<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookies Page</title>
</head>
<body>
  <h1>Cookies Test</h1>
  <input type="text" id="cookieValue" placeholder="Enter cookie value">
  <button id="setCookieBtn">Set Cookie</button>
  <button id="readCookieBtn">Read Cookie</button>
  <script>
    document.getElementById('setCookieBtn').addEventListener('click', () => {
      const value = document.getElementById('cookieValue').value;
      document.cookie = 'testCookie=' + value + '; path=/';
    });
    document.getElementById('readCookieBtn').addEventListener('click', () => {
      alert(document.cookie);
    });
  </script>
</body>
</html>
