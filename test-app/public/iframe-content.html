<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iframe Content</title>
</head>
<body>
  <h2>Iframe Content</h2>
  <p>This is content inside an iframe</p>
  <button id="iframeBtn">Iframe Button</button>
  <script>
    document.getElementById('iframeBtn').addEventListener('click', () => {
      alert('Iframe button clicked!');
    });
  </script>
</body>
</html>
