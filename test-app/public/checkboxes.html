<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkboxes Page</title>
</head>
<body>
  <h1>Checkboxes and Radio Buttons</h1>
  <h3>Checkboxes</h3>
  <label><input type="checkbox" name="option" value="1"> Option 1</label><br>
  <label><input type="checkbox" name="option" value="2"> Option 2</label><br>
  <label><input type="checkbox" name="option" value="3"> Option 3</label>
  <h3>Radio Buttons</h3>
  <label><input type="radio" name="size" value="small"> Small</label><br>
  <label><input type="radio" name="size" value="medium"> Medium</label><br>
  <label><input type="radio" name="size" value="large"> Large</label>
</body>
</html>
